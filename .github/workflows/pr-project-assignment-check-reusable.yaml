name: PR Project Assignment Check

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
        description: 'Pull request number to check for project assignment'
      repo_owner:
        required: true
        type: string
        description: 'Repository owner'
      repo_name:
        required: true
        type: string
        description: 'Repository name'
      warning_message:
        required: false
        type: string
        description: 'Custom warning message when no projects are assigned'
        default: 'No projects are assigned to this PR. Consider assigning projects if this change should be applied to other version/release branches.'
    secrets:
      PROJECT_TOKEN:
        required: false
        description: 'Personal Access Token with read:project scope for private project detection'

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  TERM: xterm

jobs:
  check_project_assignment:
    runs-on: ubuntu-latest
    env:
      # Use PROJECT_TOKEN if provided (for private projects), otherwise use GITHUB_TOKEN
      GH_TOKEN: ${{ secrets.PROJECT_TOKEN || github.token }}
    steps:
      - name: Checkout pr-project-assignment scripts
        uses: actions/checkout@v6
        with:
          repository: scalar-labs/actions
          sparse-checkout: pr-project-assignment-script
          ref: main
          path: pr-project-assignment

      - name: Check for project assignment
        working-directory: pr-project-assignment
        env:
          SCRIPT_PATH: ./pr-project-assignment-script
        run: |
          echo "Checking project assignment for PR #${{ inputs.pr_number }}..."

          # Get projects assigned to the PR.
          projects=$($SCRIPT_PATH/check_pr_project_assignment "${{ inputs.repo_owner }}" "${{ inputs.repo_name }}" "${{ inputs.pr_number }}")

          echo "DEBUG: All projects found: '$projects'"

          if [[ -z "$projects" ]]; then
            echo "::warning title=No projects assigned::${{ inputs.warning_message }}"
            echo "ℹ️ This is a warning only and will not block the PR."
            echo "no_projects=true" >> $GITHUB_OUTPUT
          else
            echo "✅ PR is assigned to projects: $projects"
            echo "no_projects=false" >> $GITHUB_OUTPUT
          fi
        id: check_projects

      - name: Comment on PR when no projects are assigned
        if: steps.check_projects.outputs.no_projects == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: '${{ inputs.repo_owner }}',
              repo: '${{ inputs.repo_name }}',
              pull_number: ${{ inputs.pr_number }}
            });

            const comment = `⚠️ @${pr.user.login} ${{ inputs.warning_message }}

            **Please choose one:**
            - **If this change affects specific versions/releases:** Assign this PR to the appropriate project versions in the sidebar.
            - **If no project tracking is needed:** React with 👍 on this comment.

            This helps ensure proper change tracking across releases and versions.`;

            await github.rest.issues.createComment({
              owner: '${{ inputs.repo_owner }}',
              repo: '${{ inputs.repo_name }}',
              issue_number: ${{ inputs.pr_number }},
              body: comment
            });
